<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>问刘十九 — 白居易</title>
<script src="https://code.responsivevoice.org/responsivevoice.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=ZCOOL+XiaoWei&family=Ma+Shan+Zheng&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Noto Serif SC', 'ZCOOL XiaoWei', serif;
    background: linear-gradient(135deg, #fff3e0 0%, #ffe0b2 50%, #fff3e0 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
}

.container {
    max-width: 640px;
    width: 100%;
    background: rgba(255, 255, 255, 0.92);
    border-radius: 32px;
    padding: 30px 24px 40px;
    box-shadow: 0 8px 32px rgba(233, 30, 99, 0.12);
    backdrop-filter: blur(8px);
    position: relative;
    overflow: hidden;
}

.container::before {
    content: '🌻';
    position: absolute;
    top: 10px; right: 20px;
    font-size: 36px;
    opacity: 0.3;
    animation: float 4s ease-in-out infinite;
}

.container::after {
    content: '🦊';
    position: absolute;
    bottom: 20px; left: 16px;
    font-size: 28px;
    opacity: 0.25;
    animation: float 5s ease-in-out infinite 1s;
}

@keyframes float {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(5deg); }
}

.back-link {
    display: inline-block;
    color: #ff6d00;
    text-decoration: none;
    font-size: 16px;
    margin-bottom: 16px;
    padding: 6px 14px;
    border-radius: 20px;
    background: rgba(233, 30, 99, 0.08);
    transition: all 0.2s;
}

.back-link:hover {
    background: rgba(233, 30, 99, 0.18);
    transform: translateX(-3px);
}

.poem-header {
    text-align: center;
    margin-bottom: 20px;
}

.poem-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 36px;
    color: #e65100;
    margin-bottom: 4px;
    font-weight: 400;
}

.poem-subtitle {
    font-size: 16px;
    color: #ff6d00;
    opacity: 0.7;
}

.poem-text {
    font-size: 24px;
    line-height: 2.4;
    text-align: center;
    margin: 20px 0;
    padding: 20px 10px;
    background: rgba(248, 187, 208, 0.12);
    border-radius: 20px;
    position: relative;
}

.poem-text ruby {
    ruby-align: center;
}

.poem-text rt {
    font-size: 14px;
    color: #ff6d00;
    opacity: 0.75;
    font-family: 'Noto Serif SC', serif;
}

.read-btn {
    display: block;
    margin: 0 auto 20px;
    padding: 12px 32px;
    font-size: 18px;
    font-family: 'Noto Serif SC', serif;
    background: linear-gradient(135deg, #ff6d00, #e65100);
    color: white;
    border: none;
    border-radius: 30px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 16px rgba(233, 30, 99, 0.3);
}

.read-btn:hover {
    transform: translateY(-2px) scale(1.02);
    box-shadow: 0 6px 24px rgba(233, 30, 99, 0.4);
}

.read-btn:active { transform: scale(0.97); }

.section {
    margin: 16px 0;
    padding: 16px 18px;
    border-radius: 16px;
    background: rgba(248, 187, 208, 0.08);
}

.section-title {
    font-size: 18px;
    color: #e65100;
    margin-bottom: 8px;
}

.section-content {
    font-size: 16px;
    line-height: 1.8;
    color: #444;
}

.cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin: 16px 0;
}

.flip-card {
    aspect-ratio: 3 / 4;
    perspective: 800px;
    cursor: pointer;
}

.flip-card-inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
}

.flip-card.flipped .flip-card-inner {
    transform: rotateY(180deg);
}

.flip-card-front, .flip-card-back {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 12px;
    box-shadow: 0 4px 12px rgba(233, 30, 99, 0.12);
}

.flip-card-front {
    background: linear-gradient(135deg, #ffe0b2, #ffab91);
    color: white;
}

.flip-card-front .char {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 56px;
    line-height: 1;
}

.flip-card-front .char-pinyin {
    font-size: 18px;
    margin-top: 6px;
    opacity: 0.9;
}

.flip-card-back {
    background: white;
    transform: rotateY(180deg);
    border: 2px solid #ffe0b2;
    font-size: 14px;
    line-height: 1.6;
    color: #555;
    text-align: center;
}

.flip-hint {
    text-align: center;
    font-size: 13px;
    color: #ff6d00;
    opacity: 0.6;
    margin: 4px 0 8px;
}

/* 填空游戏 */
.blank-game { margin-top: 12px; }

.blank-text {
    font-size: 22px;
    line-height: 2.2;
    text-align: center;
    background: rgba(248, 187, 208, 0.08);
    padding: 16px;
    border-radius: 16px;
    margin-bottom: 12px;
}

.blank-text .blank-slot {
    display: inline-block;
    min-width: 50px;
    border-bottom: 3px dashed #ff6d00;
    margin: 0 2px;
    padding: 0 4px;
    cursor: pointer;
    transition: all 0.3s;
}

.blank-text .blank-slot.filled {
    border-bottom-style: solid;
    color: #e65100;
    font-weight: bold;
}

.candidate-btns {
    display: flex;
    justify-content: center;
    gap: 12px;
    flex-wrap: wrap;
    margin: 12px 0;
}

.candidate-btn {
    width: 52px;
    height: 52px;
    font-size: 26px;
    font-family: 'Ma Shan Zheng', cursive;
    border: 3px solid #ffab91;
    background: white;
    color: #e65100;
    border-radius: 14px;
    cursor: pointer;
    transition: all 0.2s;
}

.candidate-btn:hover {
    background: #fff3e0;
    transform: scale(1.1);
}

.candidate-btn:disabled {
    opacity: 0.3;
    cursor: not-allowed;
    transform: none;
}

.reset-btn {
    display: block;
    margin: 12px auto 0;
    padding: 10px 24px;
    font-size: 16px;
    font-family: 'Noto Serif SC', serif;
    background: rgba(233, 30, 99, 0.1);
    color: #e65100;
    border: 2px solid #ffab91;
    border-radius: 24px;
    cursor: pointer;
    transition: all 0.2s;
}

.reset-btn:hover { background: rgba(233, 30, 99, 0.2); }

/* 庆祝 */
.celebrate-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    z-index: 1000;
    justify-content: center;
    align-items: center;
}

.celebrate-overlay.show { display: flex; }

.celebrate-box {
    background: white;
    border-radius: 32px;
    padding: 48px 40px;
    text-align: center;
    box-shadow: 0 16px 64px rgba(0,0,0,0.2);
    animation: bounceIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

.celebrate-box .emoji { font-size: 72px; display: block; margin-bottom: 12px; }
.celebrate-box .msg { font-size: 28px; font-family: 'Ma Shan Zheng', cursive; color: #e65100; }
.celebrate-box .sub-msg { font-size: 16px; color: #888; margin-top: 8px; }
.celebrate-box .close-btn {
    margin-top: 20px; padding: 10px 32px; font-size: 18px;
    font-family: 'Noto Serif SC', serif;
    background: linear-gradient(135deg, #ff6d00, #e65100);
    color: white; border: none; border-radius: 24px; cursor: pointer;
}

@keyframes bounceIn {
    0% { transform: scale(0.3); opacity: 0; }
    50% { transform: scale(1.05); }
    70% { transform: scale(0.95); }
    100% { transform: scale(1); opacity: 1; }
}

.confetti-container {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 1001; overflow: hidden;
}

.confetti {
    position: absolute; width: 10px; height: 10px; border-radius: 2px;
    animation: confettiFall 3s ease-out forwards;
}

@keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@media (max-width: 480px) {
    .container { padding: 20px 16px; border-radius: 24px; }
    .poem-title { font-size: 28px; }
    .poem-text { font-size: 20px; padding: 14px 8px; }
    .poem-text rt { font-size: 12px; }
    .cards-grid { grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .flip-card-front .char { font-size: 40px; }
    .blank-text { font-size: 18px; }
}
</style>
</head>
<body>

<div class="container">

<a href="https://chenglin87119-ux.github.io/classical_Chinese_poetry/" class="back-link">← 返回古诗日历</a>

<div class="poem-header">
    <div class="poem-title">问刘十九</div>
    <div class="poem-subtitle">唐 · 白居易</div>
</div>

<button class="read-btn" onclick="responsiveVoice.speak(`绿蚁新醅酒，红泥小火炉。 晚来天欲雪，能饮一杯无？`, 'Chinese Female', {rate: 0.8})">🔊 听我朗读</button>

<div class="poem-text">
<ruby>绿<rt>lǜ</rt></ruby><ruby>蚁<rt>yǐ</rt></ruby><ruby>新<rt>xīn</rt></ruby><ruby>醅<rt>pēi</rt></ruby><ruby>酒<rt>jiǔ</rt></ruby>，<ruby>红<rt>hóng</rt></ruby><ruby>泥<rt>ní</rt></ruby><ruby>小<rt>xiǎo</rt></ruby><ruby>火<rt>huǒ</rt></ruby><ruby>炉<rt>lú</rt></ruby>。<br>
<ruby>晚<rt>wǎn</rt></ruby><ruby>来<rt>lái</rt></ruby><ruby>天<rt>tiān</rt></ruby><ruby>欲<rt>yù</rt></ruby><ruby>雪<rt>xuě</rt></ruby>，<ruby>能<rt>néng</rt></ruby><ruby>饮<rt>yǐn</rt></ruby><ruby>一<rt>yī</rt></ruby><ruby>杯<rt>bēi</rt></ruby><ruby>无<rt>wú</rt></ruby>？
</div>

<div class="section">
    <div class="section-title">💡 小注释</div>
    <div class="section-content">《问刘十九》是唐诗人白居易的作品。绿蚁新醅酒，红泥小火炉。</div>
</div>

<div class="section">
    <div class="section-title">📖 白话译文</div>
    <div class="section-content">新酿的酒浮着绿色的泡沫，红泥小火炉烧得正旺。天快黑了，要下雪了，能不能来喝一杯呢？</div>
</div>

<div class="section">
    <div class="section-title">📖 识字卡片</div>
    <p class="flip-hint">👆 点击卡片翻转，看看背面是什么</p>
    <div class="cards-grid" id="cardsGrid"></div>
</div>

<div class="section">
    <div class="section-title">✍️ 背诵填空</div>
    <div class="blank-game">
        <div class="blank-text" id="blankText"></div>
        <div class="candidate-btns" id="candidateBtns"></div>
        <button class="reset-btn" onclick="resetGame()">🔄 重新开始</button>
    </div>
</div>

</div>

<div class="celebrate-overlay" id="celebrateOverlay">
    <div class="celebrate-box">
        <span class="emoji">🎉</span>
        <div class="msg">好棒！全都对了！</div>
        <div class="sub-msg">你真是太厉害啦 🌟</div>
        <button class="close-btn" onclick="closeCelebrate()">再来一次</button>
    </div>
</div>

<script>
// 识字卡片数据
const cards = [{"char": "来", "meaning": "来，从别处到这里。"}, {"char": "雪", "meaning": "雪，冬天从天上飘下来的白色小片。"}, {"char": "火", "meaning": "火，热热的，会发光，要小心。"}];

// 从ruby中提取拼音
function getPinyinMap() {
    const map = {};
    document.querySelectorAll('.poem-text ruby').forEach(ruby => {
        const char = ruby.childNodes[0]?.textContent?.trim() || '';
        const py = ruby.querySelector('rt')?.textContent?.trim() || '';
        if (char && py) map[char] = py;
    });
    return map;
}

// 渲染卡片
function renderCards() {
    const grid = document.getElementById('cardsGrid');
    const pinyinMap = getPinyinMap();
    
    cards.forEach(card => {
        const py = pinyinMap[card.char] || '';
        const div = document.createElement('div');
        div.className = 'flip-card';
        div.innerHTML = '<div class="flip-card-inner">' +
            '<div class="flip-card-front">' +
                '<div class="char">' + card.char + '</div>' +
                '<div class="char-pinyin">' + py + '</div>' +
            '</div>' +
            '<div class="flip-card-back">' + card.meaning + '</div>' +
        '</div>';
        div.addEventListener('click', function() {
            this.classList.toggle('flipped');
        });
        grid.appendChild(div);
    });
}

// 填空游戏
const blanks = [[0, 3, "醅"], [0, 8, "小"], [0, 9, "火"]];

let currentFilled = 0;
let slots = [];

function initGame() {
    const lines = `绿蚁新醅酒，红泥小火炉。\n晚来天欲雪，能饮一杯无？`.split('\n');
    const container = document.getElementById('blankText');
    const candidatesDiv = document.getElementById('candidateBtns');
    
    container.innerHTML = '';
    candidatesDiv.innerHTML = '';
    currentFilled = 0;
    slots = [];
    
    lines.forEach((line, li) => {
        if (li > 0) container.appendChild(document.createElement('br'));
        [...line].forEach(c => {
            const match = blanks.find(([bl, bc, ch]) => bl === li && bl === bl && ch === c);
            if (match && match[0] === li && line.indexOf(c) === line.indexOf(c)) {
                // 用位置精确匹配
                const exactMatch = blanks.filter(([bl, bc, _]) => bl === li);
                let isBlank = false;
                let ci = [...line].indexOf(c);
                for (let m of exactMatch) {
                    if (m[1] === ci && m[2] === c) { isBlank = true; break; }
                }
                // 简化做法：按出现顺序填
            }
            container.appendChild(document.createTextNode(c));
        });
    });
    
    // 重置候选按钮
    initBlankGame(lines, container, candidatesDiv);
}

function initBlankGame(lines, container, candidatesDiv) {
    // 清理container
    container.innerHTML = '';
    let charIdx = 0;
    let blankIdx = 0;
    
    lines.forEach((line, li) => {
        if (li > 0) container.appendChild(document.createElement('br'));
        const chars = [...line];
        chars.forEach((c, ci) => {
            const isBlank = blanks.some(([bl, bc, ch]) => bl === li && bc === ci);
            if (isBlank) {
                const span = document.createElement('span');
                span.className = 'blank-slot';
                span.dataset.char = c;
                span.dataset.filled = 'false';
                span.textContent = '______';
                container.appendChild(span);
                slots.push(span);
            } else {
                container.appendChild(document.createTextNode(c));
            }
        });
    });
    
    // 获取所有需要填空的字符并去重
    const chars = [...new Set(blanks.map(b => b[2]))];
    chars.sort(() => Math.random() - 0.5);
    
    chars.forEach(c => {
        const btn = document.createElement('button');
        btn.className = 'candidate-btn';
        btn.textContent = c;
        btn.onclick = () => fillBlank(c, btn);
        candidatesDiv.appendChild(btn);
    });
}

function fillBlank(char, btn) {
    const emptySlot = slots.find(s => s.dataset.filled === 'false');
    if (!emptySlot) return;
    
    if (emptySlot.dataset.char === char) {
        emptySlot.textContent = char;
        emptySlot.className = 'blank-slot filled';
        emptySlot.dataset.filled = 'true';
        btn.disabled = true;
        currentFilled++;
        
        if (currentFilled === slots.length) {
            setTimeout(showCelebrate, 400);
        }
    } else {
        emptySlot.style.borderBottomColor = '#f44336';
        setTimeout(() => {
            emptySlot.style.borderBottomColor = '#ff6d00';
        }, 500);
    }
}

function resetGame() {
    currentFilled = 0;
    slots = [];
    const lines = `绿蚁新醅酒，红泥小火炉。\n晚来天欲雪，能饮一杯无？`.split('\n');
    const container = document.getElementById('blankText');
    const candidatesDiv = document.getElementById('candidateBtns');
    container.innerHTML = '';
    candidatesDiv.innerHTML = '';
    initBlankGame(lines, container, candidatesDiv);
}

function showCelebrate() {
    document.getElementById('celebrateOverlay').classList.add('show');
    createConfetti();
}

function closeCelebrate() {
    document.getElementById('celebrateOverlay').classList.remove('show');
    resetGame();
}

function createConfetti() {
    const container = document.createElement('div');
    container.className = 'confetti-container';
    document.body.appendChild(container);
    
    const colors = ['#ff6d00', '#ffab91', '#ffcdd2', '#fff3e0', '#ff9100', '#e65100'];
    for (let i = 0; i < 50; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.left = Math.random() * 100 + '%';
        el.style.top = '-10px';
        el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (Math.random() * 8 + 5) + 'px';
        el.style.height = (Math.random() * 8 + 5) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationDuration = (Math.random() * 2 + 2) + 's';
        el.style.animationDelay = Math.random() * 0.5 + 's';
        container.appendChild(el);
    }
    setTimeout(() => container.remove(), 4000);
}

document.addEventListener('DOMContentLoaded', renderCards);
document.addEventListener('DOMContentLoaded', () => {
    const lines = `绿蚁新醅酒，红泥小火炉。\n晚来天欲雪，能饮一杯无？`.split('\n');
    const container = document.getElementById('blankText');
    const candidatesDiv = document.getElementById('candidateBtns');
    initBlankGame(lines, container, candidatesDiv);
});
</script>
</body>
</html>
