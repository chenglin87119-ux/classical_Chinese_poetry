<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小可爱的古诗小筑</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
<style>
/* ── Reset & Base ──────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; scroll-behavior: smooth; }

body {
    font-family: 'ZCOOL XiaoWei', 'Ma Shan Zheng', 'KaiTi', 'STKaiti', serif;
    background-color: #f5f0e8;
    background-image:
        radial-gradient(ellipse at 10% 30%, rgba(180,200,180,0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 90% 20%, rgba(160,180,200,0.10) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(200,190,170,0.10) 0%, transparent 50%),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(100,100,100,0.03) 40px, rgba(100,100,100,0.03) 41px);
    min-height: 100vh;
    color: #3a3a3a;
    padding: 0 16px 120px;
    position: relative;
    overflow-x: hidden;
}

/* ink wash decorative mountains (CSS) */
body::before {
    content: '';
    position: fixed;
    top: -60px;
    right: -80px;
    width: 300px;
    height: 400px;
    background: radial-gradient(ellipse at center, rgba(120,140,130,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
}

body::after {
    content: '';
    position: fixed;
    bottom: -100px;
    left: -60px;
    width: 400px;
    height: 250px;
    background: radial-gradient(ellipse at center, rgba(140,120,100,0.06) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
}

/* scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: #ede6d9; border-radius: 4px; }
::-webkit-scrollbar-thumb { background: #b8a89a; border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: #a09080; }

/* header */
.header {
    text-align: center;
    padding: 40px 20px 30px;
    position: relative;
    z-index: 1;
}

.header h1 {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 3.2rem;
    font-weight: 400;
    color: #4a4a3a;
    letter-spacing: 8px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
    position: relative;
    display: inline-block;
}

.header h1::before {
    content: '\1F338';
    font-size: 1.6rem;
    position: absolute;
    left: -50px;
    top: 10px;
    opacity: 0.5;
}

.header h1::after {
    content: '\1F338';
    font-size: 1.6rem;
    position: absolute;
    right: -50px;
    top: 10px;
    opacity: 0.5;
}

.header .subtitle {
    font-size: 1rem;
    color: #8a7a6a;
    margin-top: 6px;
    letter-spacing: 3px;
}

/* divider */
.divider {
    text-align: center;
    color: #c8b8a8;
    font-size: 1.2rem;
    letter-spacing: 12px;
    margin: 0 0 20px;
    position: relative;
    z-index: 1;
}

/* month nav */
.month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    max-width: 780px;
    margin: 0 auto 16px;
    padding: 0 10px;
    position: relative;
    z-index: 1;
}

.month-nav button {
    background: rgba(180,170,155,0.2);
    border: 1px solid rgba(160,150,135,0.3);
    color: #5a4a3a;
    font-size: 1.6rem;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: 'ZCOOL XiaoWei', serif;
    display: flex;
    align-items: center;
    justify-content: center;
}

.month-nav button:hover {
    background: rgba(160,150,135,0.35);
    transform: scale(1.08);
}

.month-nav button:active { transform: scale(0.95); }

.month-nav .month-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.8rem;
    color: #4a4a3a;
    letter-spacing: 4px;
}

/* calendar grid */
.calendar-wrap {
    max-width: 800px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
}

.weekday-header {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 4px;
    padding: 0 4px;
}

.weekday-header span {
    text-align: center;
    font-size: 0.85rem;
    color: #8a7a6a;
    padding: 6px 0;
    font-weight: bold;
}

.calendar-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    padding: 0 4px;
}

/* day cell */
.day-cell {
    background: rgba(255,252,245,0.75);
    border: 1px solid rgba(200,190,175,0.3);
    border-radius: 8px;
    padding: 4px 3px;
    min-height: 58px;
    cursor: pointer;
    transition: all 0.2s ease;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    backdrop-filter: blur(2px);
}

.day-cell:hover {
    background: rgba(255,252,245,0.95);
    border-color: rgba(160,150,135,0.5);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}

.day-cell.empty {
    background: transparent;
    border-color: transparent;
    cursor: default;
    min-height: 0;
    height: 0;
    padding: 0;
}

.day-cell.empty:hover {
    transform: none;
    box-shadow: none;
}

.day-cell .day-num {
    font-size: 0.85rem;
    font-weight: bold;
    color: #4a4a3a;
    line-height: 1.2;
}

.day-cell .day-week {
    font-size: 0.65rem;
    color: #9a8a7a;
    line-height: 1.1;
}

.day-cell .day-icon {
    font-size: 1rem;
    line-height: 1.3;
}

.day-cell .day-uids {
    font-size: 0.55rem;
    color: #7a6a5a;
    line-height: 1.2;
    text-align: center;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    width: 100%;
}

/* type indicators */
.day-cell.type-new {
    border-left: 3px solid #7ab87a;
}

.day-cell.type-review {
    border-left: 3px solid #8ab8c8;
}

.day-cell.type-rest {
    border-left: 3px solid #d4b8a0;
}

/* today highlight */
.day-cell.today {
    background: rgba(200,220,200,0.4) !important;
    border-color: #7ab87a !important;
    box-shadow: 0 0 0 2px rgba(122,184,122,0.3);
}

/* sunday */
.day-cell.sun .day-num { color: #c07060; }
.day-cell.sun .day-week { color: #c07060; }

/* today button */
.today-btn-wrap {
    text-align: center;
    margin: 20px auto;
    position: relative;
    z-index: 1;
}

.today-btn {
    font-family: 'ZCOOL XiaoWei', serif;
    font-size: 1.1rem;
    padding: 10px 32px;
    background: rgba(160,180,160,0.25);
    border: 1px solid rgba(140,160,140,0.4);
    border-radius: 24px;
    color: #3a5a3a;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 2px;
}

.today-btn:hover {
    background: rgba(160,180,160,0.45);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(100,140,100,0.15);
}

.today-btn:active { transform: translateY(0); }

/* modal */
.modal-overlay {
    display: none;
    position: fixed;
    z-index: 100;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(40,35,30,0.4);
    backdrop-filter: blur(3px);
    justify-content: center;
    align-items: center;
}

.modal-overlay.show { display: flex; }

.modal-box {
    background: linear-gradient(145deg, #faf7f0, #f0ece4);
    border: 1px solid rgba(200,190,175,0.5);
    border-radius: 16px;
    max-width: 420px;
    width: 90%;
    padding: 28px 24px 24px;
    position: relative;
    box-shadow: 0 12px 40px rgba(0,0,0,0.12);
    animation: modalIn 0.3s ease;
}

@keyframes modalIn {
    from { opacity: 0; transform: scale(0.92) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
}

.modal-close {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 1.5rem;
    cursor: pointer;
    color: #9a8a7a;
    background: none;
    border: none;
    font-family: serif;
    transition: color 0.2s;
}

.modal-close:hover { color: #5a4a3a; }

.modal-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.5rem;
    color: #4a4a3a;
    margin-bottom: 4px;
}

.modal-date {
    font-size: 0.85rem;
    color: #9a8a7a;
    margin-bottom: 14px;
}

.modal-section {
    margin-bottom: 12px;
}

.modal-section h3 {
    font-size: 0.9rem;
    color: #6a5a4a;
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
}

.modal-poem {
    display: flex;
    align-items: center;
    padding: 6px 10px;
    background: rgba(255,255,255,0.5);
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 0.95rem;
    transition: background 0.2s;
}

.modal-poem:hover {
    background: rgba(255,255,255,0.8);
}

.modal-poem a {
    color: #3a5a3a;
    text-decoration: none;
    flex: 1;
}

.modal-poem a:hover {
    color: #5a8a5a;
    text-decoration: underline;
}

.modal-divider {
    height: 1px;
    background: rgba(200,190,175,0.4);
    margin: 8px 0;
}

.modal-empty {
    color: #9a8a7a;
    font-style: italic;
    font-size: 0.9rem;
    padding: 8px 0;
}

/* footer */
.footer {
    text-align: center;
    padding: 30px 20px 10px;
    color: #9a8a7a;
    font-size: 0.8rem;
    position: relative;
    z-index: 1;
}

.footer .seal {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.2rem;
    color: #b07060;
    margin-top: 8px;
    opacity: 0.6;
}

/* responsive */
@media (max-width: 500px) {
    .header h1 { font-size: 2.2rem; letter-spacing: 4px; }
    .header h1::before, .header h1::after { display: none; }
    .month-nav .month-title { font-size: 1.4rem; }
    .day-cell { min-height: 48px; padding: 3px 2px; }
    .day-cell .day-num { font-size: 0.75rem; }
    .day-cell .day-icon { font-size: 0.85rem; }
    .day-cell .day-uids { font-size: 0.5rem; }
    .modal-box { padding: 20px 16px; }
}

@media (max-width: 360px) {
    .day-cell { min-height: 42px; }
    .day-cell .day-num { font-size: 0.7rem; }
    .day-cell .day-uids { display: none; }
}
</style>
</head>

<div class="header">

<div class="footer">

const BASE_URL = 'https://chenglin87119-ux.github.io/classical_Chinese_poetry/';

const WEEKDAYS = {'0':'日','1':'一','2':'二','3':'三','4':'四','5':'五','6':'六'};
const WEEKDAYS_SHORT = {'0':'周日','1':'周一','2':'周二','3':'周三','4':'周四','5':'周五','6':'周六'};

const dateIndexMap = {};
CAL_DATES.forEach((d, i) => { dateIndexMap[d] = i; });

let currentYear, currentMonth;

function getTodayStr() {
    const t = new Date();
    const y = t.getFullYear();
    const m = String(t.getMonth() + 1).padStart(2, '0');
    const d = String(t.getDate()).padStart(2, '0');
    return y + '-' + m + '-' + d;
}

function renderCalendar(year, month) {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    const firstDay = new Date(year, month - 1, 1);
    let startDow = firstDay.getDay();
    startDow = (startDow === 0) ? 6 : startDow - 1;

    const daysInMonth = new Date(year, month, 0).getDate();
    const todayStr = getTodayStr();

    for (let i = 0; i < startDow; i++) {
        const empty = document.createElement('div');
        empty.className = 'day-cell empty';
        grid.appendChild(empty);
    }

    for (let day = 1; day <= daysInMonth; day++) {
        const monthStr = String(month).padStart(2, '0');
        const dayStr = String(day).padStart(2, '0');
        const dateStr = year + '-' + monthStr + '-' + dayStr;
        const d = new Date(year, month - 1, day);
        const dow = d.getDay();
        const dowCN = WEEKDAYS[dow];

        const cell = document.createElement('div');
        cell.className = 'day-cell';
        if (dow === 0) cell.classList.add('sun');
        if (dateStr === todayStr) cell.classList.add('today');

        const idx = dateIndexMap[dateStr];
        if (idx !== undefined) {
            const type = CAL_TYPES[idx];
            cell.classList.add('type-' + type);
            cell.dataset.date = dateStr;
            cell.addEventListener('click', function() { showModal(dateStr); });

            if (type === 'rest') {
                cell.innerHTML = '<div class="day-num">' + day + '</div><div class="day-week">' + dowCN + '</div><div class="day-icon">&#x1F390;</div>';
            } else {
                const newUids = CAL_NEW[idx];
                const reviewUids = CAL_REVIEW[idx];
                let icon = '&#x1F4D6;';
                if (type === 'new') icon = '&#x1F331;';
                let allUids = newUids.concat(reviewUids);
                let uidsText = allUids.join(' ');
                cell.innerHTML = '<div class="day-num">' + day + '</div><div class="day-week">' + dowCN + '</div><div class="day-icon">' + icon + '</div><div class="day-uids">' + uidsText + '</div>';
            }
        } else {
            cell.innerHTML = '<div class="day-num">' + day + '</div><div class="day-week">' + dowCN + '</div>';
        }

        grid.appendChild(cell);
    }

    document.getElementById('monthTitle').textContent = year + '年' + month + '月';
}

function goToMonth(year, month) {
    currentYear = year;
    currentMonth = month;
    renderCalendar(year, month);
}

function goToToday() {
    const t = new Date();
    const todayStr = getTodayStr();
    const idx = dateIndexMap[todayStr];
    if (idx !== undefined) {
        goToMonth(t.getFullYear(), t.getMonth() + 1);
        setTimeout(function() {
            const todayCell = document.querySelector('.day-cell.today');
            if (todayCell) {
                todayCell.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }, 100);
        return;
    }
    const firstDate = CAL_DATES[0];
    const fd = new Date(firstDate);
    goToMonth(fd.getFullYear(), fd.getMonth() + 1);
}

document.getElementById('prevMonth').addEventListener('click', function() {
    let m = currentMonth - 1;
    let y = currentYear;
    if (m < 1) { m = 12; y--; }
    goToMonth(y, m);
});

document.getElementById('nextMonth').addEventListener('click', function() {
    let m = currentMonth + 1;
    let y = currentYear;
    if (m > 12) { m = 1; y++; }
    goToMonth(y, m);
});

document.getElementById('todayBtn').addEventListener('click', goToToday);

function showModal(dateStr) {
    const overlay = document.getElementById('modalOverlay');
    const titleEl = document.getElementById('modalTitle');
    const dateEl = document.getElementById('modalDate');
    const contentEl = document.getElementById('modalContent');

    const idx = dateIndexMap[dateStr];
    if (idx === undefined) return;

    const parts = dateStr.split('-');
    const y = parts[0], m = parseInt(parts[1]), day = parseInt(parts[2]);
    const d = new Date(y, m - 1, day);
    const dow = WEEKDAYS_SHORT[d.getDay()];
    dateEl.textContent = y + '年' + m + '月' + day + '日 ' + dow;

    const type = CAL_TYPES[idx];
    const newUids = CAL_NEW[idx];
    const reviewUids = CAL_REVIEW[idx];

    let html = '';

    if (type === 'rest') {
        html = '<div class="modal-empty">&#x1F390; 今天休息日，小可爱放松一下吧～</div>';
    } else {
        if (type === 'new' && newUids.length > 0) {
            html += '<div class="modal-section"><h3>&#x1F331; 新学</h3>';
            for (let i = 0; i < newUids.length; i++) {
                const uid = newUids[i];
                const info = POEM_MAP[uid] || uid;
                const num = uid.replace('U', '');
                html += '<div class="modal-poem"><a href="' + BASE_URL + 'poem_' + num + '.html" target="_blank">' + info + '</a></div>';
            }
            html += '</div>';
        }

        if (reviewUids.length > 0) {
            if (type === 'new') html += '<div class="modal-divider"></div>';
            html += '<div class="modal-section"><h3>&#x1F4D6; 复习</h3>';
            for (let i = 0; i < reviewUids.length; i++) {
                const uid = reviewUids[i];
                const info = POEM_MAP[uid] || uid;
                const num = uid.replace('U', '');
                html += '<div class="modal-poem"><a href="' + BASE_URL + 'poem_' + num + '.html" target="_blank">' + info + '</a></div>';
            }
            html += '</div>';
        }
    }

    if (type !== 'rest' && newUids.length === 0 && reviewUids.length === 0) {
        html = '<div class="modal-empty">今天没有古诗任务～</div>';
    }

    if (type === 'rest') {
        titleEl.innerHTML = '&#x1F390; 休闲日';
    } else if (type === 'new') {
        titleEl.innerHTML = '&#x1F331; 学习新诗';
    } else {
        titleEl.innerHTML = '&#x1F4D6; 复习古诗';
    }

    contentEl.innerHTML = html;
    overlay.classList.add('show');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
});

const firstDate = CAL_DATES[0];
const fd = new Date(firstDate);
goToMonth(fd.getFullYear(), fd.getMonth() + 1);
